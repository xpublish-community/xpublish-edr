[build-system]
requires = ["setuptools>=61", "wheel", "setuptools_scm[toml]>=3.4"]
build-backend = "setuptools.build_meta"

[project]
name = "xpublish_edr"
description = ""
readme = "README.md"
requires-python = ">=3.11"
keywords = []
license = { file = "LICENSE.txt" }

classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Science/Research",
    "Operating System :: OS Independent",
    "License :: OSI Approved :: BSD License",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering",
]

dynamic = ["version"]
dependencies = [
    "geopandas",
    "pyarrow",
    "rioxarray",
    "scipy",
    "shapely",
    "xarray",
    "xpublish>=0.4.1",
]

[project.entry-points."xpublish.plugin"]
cf_edr = "xpublish_edr.plugin:CfEdrPlugin"

[project.entry-points.xpublish_edr_position_formats]
cf_covjson = "xpublish_edr.formats.to_covjson:to_cf_covjson"
csv = "xpublish_edr.formats.to_csv:to_csv"
geojson = "xpublish_edr.formats.to_geojson:to_geojson"
nc = "xpublish_edr.formats.to_netcdf:to_netcdf"
netcdf = "xpublish_edr.formats.to_netcdf:to_netcdf"
nc4 = "xpublish_edr.formats.to_netcdf:to_netcdf"
netcdf4 = "xpublish_edr.formats.to_netcdf:to_netcdf"
parquet = "xpublish_edr.formats.to_parquet:to_parquet"

[project.entry-points.xpublish_edr_area_formats]
cf_covjson = "xpublish_edr.formats.to_covjson:to_cf_covjson"
csv = "xpublish_edr.formats.to_csv:to_csv"
geojson = "xpublish_edr.formats.to_geojson:to_geojson"
nc = "xpublish_edr.formats.to_netcdf:to_netcdf"
netcdf = "xpublish_edr.formats.to_netcdf:to_netcdf"
nc4 = "xpublish_edr.formats.to_netcdf:to_netcdf"
netcdf4 = "xpublish_edr.formats.to_netcdf:to_netcdf"
parquet = "xpublish_edr.formats.to_parquet:to_parquet"

[project.entry-points.xpublish_edr_cube_formats]
cf_covjson = "xpublish_edr.formats.to_covjson:to_cf_covjson"
csv = "xpublish_edr.formats.to_csv:to_csv"
geojson = "xpublish_edr.formats.to_geojson:to_geojson"
nc = "xpublish_edr.formats.to_netcdf:to_netcdf"
netcdf = "xpublish_edr.formats.to_netcdf:to_netcdf"
nc4 = "xpublish_edr.formats.to_netcdf:to_netcdf"
netcdf4 = "xpublish_edr.formats.to_netcdf:to_netcdf"
parquet = "xpublish_edr.formats.to_parquet:to_parquet"
geotiff = "xpublish_edr.formats.to_geotiff:to_geotiff"


[tool.check-manifest]
ignore = ["xpublish_edr/_version.py"]

[tool.setuptools]
packages = ["xpublish_edr"]

[tool.setuptools_scm]
write_to = "xpublish_edr/_version.py"

[tool.interrogate]
ignore-init-method = true
ignore-init-module = false
ignore-magic = false
ignore-semiprivate = false
ignore-private = false
ignore-module = false
fail-under = 95
exclude = ["setup.py", "docs", "tests"]
verbose = 1
quiet = false
color = true

# ── Pixi ──────────────────────────────────────────────────────────────────────
# https://pixi.sh/latest/reference/project_configuration/
[tool.pixi.project]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

# Runtime dependencies (resolved via conda-forge)
[tool.pixi.dependencies]
python = ">=3.11,<3.14"
geopandas = ">=0.9"
pyarrow = ">=10"
rioxarray = "*"
scipy = ">=1.9"
shapely = ">=2.0"
xarray = ">=2023.1"
pip = "*"

# The package itself is installed as an editable PyPI dependency
[tool.pixi.pypi-dependencies]
xpublish-edr = { path = ".", editable = true }

# ── feature: test ─────────────────────────────────────────────────────────────
[tool.pixi.feature.test.dependencies]
cf_xarray = "*"
httpx = "*"
netcdf4 = "*"
pooch = "*"
pytest = ">=7"
pytest-cov = "*"
pytest-xdist = "*"
uvicorn = "*"

[tool.pixi.feature.test.pypi-dependencies]
zarr = ">=3.0.7"
pytest-github-actions-annotate-failures = "*"

[tool.pixi.feature.test.tasks]
test = "pytest -rxs --cov=xpublish_edr --cov-report=xml tests"

# ── feature: lint ─────────────────────────────────────────────────────────────
[tool.pixi.feature.lint.dependencies]
pre-commit = "*"
ruff = "*"
black = "*"

[tool.pixi.feature.lint.tasks]
lint = "pre-commit run --all-files"
lint-ci = "pre-commit run --all-files --show-diff-on-failure"

# ── Python-version features (used to pin Python in multi-version environments) ─
[tool.pixi.feature.py311.dependencies]
python = "3.11.*"

[tool.pixi.feature.py312.dependencies]
python = "3.12.*"

[tool.pixi.feature.py313.dependencies]
python = "3.13.*"

# ── environments ──────────────────────────────────────────────────────────────
[tool.pixi.environments]
# Default: latest supported Python + test dependencies
default = { features = ["test"], solve-group = "default" }

# Per-Python-version test environments
py311 = { features = ["test", "py311"], solve-group = "py311" }
py312 = { features = ["test", "py312"], solve-group = "py312" }
py313 = { features = ["test", "py313"], solve-group = "py313" }

# Lint environment (separate to keep it lean)
lint = { features = ["lint"], solve-group = "lint" }
