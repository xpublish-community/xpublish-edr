repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: tests/data
      - id: check-ast
      - id: debug-statements
      - id: end-of-file-fixer
      - id: check-docstring-first
      - id: check-added-large-files
      - id: requirements-txt-fixer
      - id: file-contents-sorter
        files: requirements-dev.txt

  - repo: https://github.com/econchick/interrogate
    rev: 1.7.0
    hooks:
      - id: interrogate
        exclude: ^(docs|setup.py|tests)
        args: [--config=pyproject.toml]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.15.16"
    hooks:
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix, --show-fixes]
      - id: ruff-format

  - repo: https://github.com/hukkin/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-myst

  - repo: https://github.com/adamchainz/blacken-docs
    rev: "1.20.0"
    hooks:
      - id: blacken-docs
        additional_dependencies:
          - black==23.1.0

  # - repo: https://github.com/pre-commit/mirrors-mypy
  #   rev: v2.1.0
  #   hooks:
  #     - id: mypy
  #       exclude: docs/source/conf.py
  #       args: [--ignore-missing-imports]
  #       additional_dependencies:
  #         [typing_extensions>=4.2.0, types-setuptools, types-PyYAML]

  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: "v2.24.0"
    hooks:
      - id: pyproject-fmt

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args:
          - --quiet-level=2

  - repo: https://github.com/asottile/add-trailing-comma
    rev: v4.0.0
    hooks:
      - id: add-trailing-comma

  - repo: https://github.com/zizmorcore/zizmor-pre-commit
    rev: v1.25.2
    hooks:
      - id: zizmor

  - repo: https://github.com/scientific-python/repo-review
    rev: "v1.1.3"
    hooks:
      - id: repo-review
        additional_dependencies:
          ["repo-review[cli]", "sp-repo-review==2026.4.4"]
        pass_filenames: false

# Delay auto-updates for 7 days
# https://prek.j178.dev/reference/configuration/?h=cooldow#auto_updatecooldown_days
auto_update:
  cooldown_days: 7
